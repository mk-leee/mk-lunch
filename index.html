<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오늘 뭐 먹지?</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF6B35;
    --primary-light: #FF8C5A;
    --secondary: #FFB347;
    --bg: #FFF8F3;
    --surface: #FFFFFF;
    --text: #2D2D2D;
    --muted: #9E9E9E;
    --accent: #4CAF82;
    --danger: #E53935;
    --border: #F0E8E0;
    --shadow: 0 2px 12px rgba(255,107,53,0.10);
    --nav-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
    position: relative;
    overflow-x: hidden;
  }
  /* ── NAV ── */
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    height: var(--nav-h);
    background: var(--surface);
    display: flex; align-items: stretch;
    border-top: 1px solid var(--border);
    z-index: 100;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; background: none; border: none; cursor: pointer;
    font-size: 10px; font-family: inherit; color: var(--muted);
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--primary); }
  .nav-btn svg { width: 22px; height: 22px; }
  /* ── SCREENS ── */
  .screen { display: none; padding: 20px 16px calc(var(--nav-h) + 20px); min-height: 100dvh; }
  .screen.active { display: block; }
  /* ── HEADER ── */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 12px;
  }
  .page-title { font-size: 22px; font-weight: 900; color: var(--text); }
  /* ── HOME ── */
  .home-greeting {
    padding: 20px 0 8px;
    font-size: 14px; color: var(--muted);
  }
  .home-greeting strong { color: var(--primary); font-size: 20px; font-weight: 900; display: block; margin-top: 2px; }

  .category-filter {
    display: flex; gap: 8px; overflow-x: auto; padding: 8px 0;
    scrollbar-width: none;
  }
  .category-filter::-webkit-scrollbar { display: none; }
  .category-filter.cat-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 5px; overflow-x: visible; padding: 6px 0;
  }
  .category-filter.cat-grid .chip {
    padding: 7px 2px; font-size: 11px; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chip {
    flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); transition: all 0.18s;
    font-family: inherit;
  }
  .chip.active {
    background: var(--primary); border-color: var(--primary); color: #fff;
  }

  /* ── ROULETTE ── */
  .roulette-wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 0 20px;
    gap: 20px;
  }
  .spin-btn {
    width: 180px; height: 180px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(255,107,53,0.35), 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative; overflow: hidden;
  }
  .spin-btn::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.25), transparent 60%);
    border-radius: 50%;
  }
  .spin-btn:active { transform: scale(0.94); box-shadow: 0 4px 16px rgba(255,107,53,0.25); }
  .spin-btn .spin-icon { font-size: 48px; line-height:1; }
  .spin-btn .spin-label { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  @keyframes spin-wobble {
    0%   { transform: rotate(0deg) scale(1); }
    15%  { transform: rotate(-12deg) scale(1.04); }
    35%  { transform: rotate(14deg) scale(1.06); }
    55%  { transform: rotate(-10deg) scale(1.05); }
    75%  { transform: rotate(8deg) scale(1.03); }
    90%  { transform: rotate(-4deg) scale(1.01); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .spin-btn.spinning { animation: spin-wobble 0.9s ease; pointer-events: none; }

  /* ── RESULT CARD ── */
  .result-card {
    width: 100%; background: var(--surface);
    border-radius: 20px; padding: 20px;
    box-shadow: var(--shadow);
    border: 2px solid var(--border);
    transition: all 0.3s;
  }
  .result-card.revealed {
    border-color: var(--primary);
    box-shadow: 0 4px 24px rgba(255,107,53,0.18);
  }
  .result-empty {
    text-align: center; color: var(--muted); font-size: 14px; padding: 8px 0;
  }
  .result-restaurant { font-size: 20px; font-weight: 900; color: var(--text); }
  .result-menu { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .result-cat-badge {
    display: inline-block; margin-top: 8px;
    padding: 3px 10px; border-radius: 12px;
    background: #FFF0E8; color: var(--primary);
    font-size: 12px; font-weight: 700;
  }
  .result-actions {
    display: flex; gap: 10px; margin-top: 14px;
  }
  .btn { padding: 13px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px; transition: all 0.15s; }
  .btn-primary { background: var(--primary); color: #fff; flex: 1; }
  .btn-primary:active { background: var(--primary-light); }
  .btn-outline { background: var(--surface); color: var(--muted); border: 1.5px solid var(--border); flex: 1; }
  .btn-outline:active { background: var(--bg); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-danger { background: #FFF0F0; color: var(--danger); border: 1.5px solid #FFCDD2; }

  /* ── EXCLUDED NOTICE ── */
  .excluded-notice {
    background: #FFF3E0; border: 1px solid #FFE0B2; border-radius: 10px;
    padding: 10px 14px; font-size: 12px; color: #E65100;
    display: flex; align-items: center; gap: 6px; margin-top: 0;
  }

  /* ── RESTAURANT LIST ── */
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border-radius: 12px; padding: 0 14px;
    border: 1.5px solid var(--border); margin-bottom: 4px;
  }
  .search-bar input {
    flex: 1; border: none; outline: none; background: none;
    font-family: inherit; font-size: 14px; padding: 13px 0;
    color: var(--text);
  }
  .search-bar input::placeholder { color: var(--muted); }

  .restaurant-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .restaurant-card {
    background: var(--surface); border-radius: 16px; padding: 16px;
    box-shadow: var(--shadow); border: 1.5px solid var(--border);
    cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    transform: translateX(0);
  }
  .restaurant-card.swipe-left { transform: translateX(-70px); }
  .restaurant-card-info { flex: 1; }
  .restaurant-card-name { font-size: 16px; font-weight: 700; }
  .restaurant-card-menus { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .restaurant-card-meta { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .restaurant-card-visit { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .delete-btn-slide {
    position: absolute; right: -70px; top: 0; height: 100%; width: 66px;
    background: var(--danger); display: flex; align-items: center; justify-content: center;
    border-radius: 0 14px 14px 0; cursor: pointer; color: #fff; font-size: 22px;
    transition: right 0.2s;
  }
  .restaurant-card.swipe-left .delete-btn-slide { right: 0; }

  .fab {
    position: fixed; bottom: calc(var(--nav-h) + 16px); right: calc(50% - 215px + 16px);
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--primary); color: #fff; border: none; cursor: pointer;
    font-size: 26px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(255,107,53,0.40);
    transition: transform 0.12s;
    z-index: 50;
  }
  .fab:active { transform: scale(0.92); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 56px; display: block; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; line-height: 1.6; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--surface); border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px; width: 100%; max-width: 430px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 90dvh; overflow-y: auto;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--border);
    border-radius: 12px; font-family: inherit; font-size: 14px; color: var(--text);
    background: var(--bg); outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--primary); }
  .menu-tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .menu-tag {
    display: flex; align-items: center; gap: 4px;
    background: #FFF0E8; color: var(--primary); border-radius: 12px;
    padding: 5px 10px; font-size: 13px; font-weight: 600;
  }
  .menu-tag-del { cursor: pointer; font-size: 14px; opacity: 0.7; }
  .menu-input-row { display: flex; gap: 8px; }
  .menu-input-row .form-input { flex: 1; }
  .cat-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .cat-option { padding: 8px 14px; border-radius: 10px; border: 1.5px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 600; background: var(--surface); color: var(--muted); font-family: inherit; }
  .cat-option.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .form-actions { display: flex; gap: 10px; margin-top: 24px; }

  /* ── HISTORY ── */
  .history-group { margin-bottom: 20px; }
  .history-date-label { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; padding: 0 2px; }
  .history-item {
    background: var(--surface); border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow); margin-bottom: 8px; border: 1.5px solid var(--border);
  }
  .history-emoji { font-size: 28px; }
  .history-info { flex: 1; }
  .history-restaurant { font-size: 15px; font-weight: 700; }
  .history-menu { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .history-del { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--muted); padding: 4px; }

  /* ── SETTINGS ── */
  .settings-section { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  .settings-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { font-size: 14px; font-weight: 500; }
  .stepper { display: flex; align-items: center; gap: 14px; }
  .stepper-btn { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-family: inherit; }
  .stepper-val { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%) translateY(0);
    background: var(--text); color: #fff; border-radius: 10px;
    padding: 11px 20px; font-size: 14px; font-weight: 600;
    z-index: 300; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }

  /* ── PREFERENCE MODAL ── */
  .pref-menu-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .pref-menu-row:last-child { border-bottom: none; }
  .pref-menu-name { font-size: 15px; font-weight: 600; flex: 1; }
  .pref-toggle { display: flex; gap: 6px; }
  .pref-btn {
    width: 42px; height: 42px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .pref-btn.active-like    { background: #E8F5E9; border-color: #4CAF50; transform: scale(1.1); }
  .pref-btn.active-neutral { background: #FFF8E1; border-color: #FFC107; transform: scale(1.1); }
  .pref-btn.active-dislike { background: #FFEBEE; border-color: #EF5350; transform: scale(1.1); }
  .pref-open-btn {
    background: none; border: none; font-size: 16px; cursor: pointer;
    padding: 4px 6px; flex-shrink: 0; opacity: 0.65; transition: opacity 0.15s;
  }
  .pref-open-btn:active { opacity: 1; }
  .menu-pref-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-left: 4px; vertical-align: middle; flex-shrink: 0;
  }
  .dot-like    { background: #4CAF50; }
  .dot-dislike { background: #EF5350; }

  /* ── MEAL TOGGLE ── */
  .meal-toggle {
    display: flex; gap: 0; margin: 8px 0 4px;
    background: var(--border); border-radius: 14px; padding: 3px;
  }
  .meal-btn {
    flex: 1; padding: 9px; border-radius: 11px; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
    background: none; color: var(--muted);
  }
  .meal-btn.active {
    background: var(--surface); color: var(--primary);
    box-shadow: 0 1px 6px rgba(0,0,0,0.10);
  }
  .meal-badge {
    font-size: 11px; font-weight: 700; padding: 2px 7px;
    border-radius: 8px; margin-right: 4px;
  }
  .meal-badge-lunch  { background: #FFF3E0; color: #E65100; }
  .meal-badge-dinner { background: #EDE7F6; color: #4527A0; }

  /* ── SEASON BANNER ── */
  .season-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 12px; margin-bottom: 4px;
    font-size: 13px; font-weight: 500;
  }
  .season-banner.spring { background: #FFF0F5; color: #C2185B; }
  .season-banner.summer { background: #E3F2FD; color: #1565C0; }
  .season-banner.autumn { background: #FFF3E0; color: #E65100; }
  .season-banner.winter { background: #EDE7F6; color: #4527A0; }

  /* ── SITUATION CHIPS ── */
  .section-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 10px 0 4px;
  }

  /* ── RESULT REASON ── */
  .result-reason {
    font-size: 12px; color: var(--muted); margin-top: 6px;
    display: flex; align-items: center; gap: 4px;
  }

  /* ── MISC ── */
  .badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 8px; background: #FFF0E8; color: var(--primary); }
  .count-badge { background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }
  .section-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- SCREENS -->
<div id="screen-home" class="screen active">
  <div class="home-greeting">
    오늘도 고민되시죠?<br>
    <strong id="home-greeting-text">🍽️ 오늘 점심 뭐 먹지? <span id="home-version-display" style="font-size:12px;font-weight:500;color:var(--muted);vertical-align:middle;"></span></strong>
  </div>

  <div class="meal-toggle">
    <button class="meal-btn active" data-meal="점심" onclick="selectMeal('점심')">🌞 점심</button>
    <button class="meal-btn" data-meal="저녁" onclick="selectMeal('저녁')">🌙 저녁</button>
  </div>

  <div id="season-banner" class="season-banner" style="display:none"></div>

  <div class="section-label">카테고리</div>
  <div class="category-filter cat-grid" id="home-cat-filter">
    <button class="chip active" data-cat="전체">전체</button>
    <button class="chip" data-cat="한식">🍚한식</button>
    <button class="chip" data-cat="중식">🥟중식</button>
    <button class="chip" data-cat="일식">🍣일식</button>
    <button class="chip" data-cat="양식">🍝양식</button>
    <button class="chip" data-cat="분식">🍢분식</button>
    <button class="chip" data-cat="기타">🍴기타</button>
  </div>

  <div class="section-label">오늘의 날씨</div>
  <div class="category-filter" id="home-situation-filter">
    <button class="chip active" data-sit="전체">전체</button>
    <button class="chip" data-sit="맑음">🌤 맑음</button>
    <button class="chip" data-sit="비">🌧 비</button>
    <button class="chip" data-sit="더워">🥵 더워</button>
    <button class="chip" data-sit="추워">🥶 추워</button>
  </div>

  <div class="roulette-wrap">
    <button class="spin-btn" id="spin-btn" onclick="doSpin()">
      <span class="spin-icon">🎰</span>
      <span class="spin-label">눌러서 결정!</span>
    </button>

    <div class="result-card" id="result-card">
      <div class="result-empty" id="result-empty">버튼을 눌러 오늘 메뉴를 뽑아보세요 😋</div>
      <div id="result-content" style="display:none">
        <div class="result-restaurant" id="result-name"></div>
        <div class="result-menu" id="result-menu"></div>
        <div class="result-cat-badge" id="result-cat"></div>
        <div class="result-reason" id="result-reason"></div>
        <div class="result-actions">
          <button class="btn btn-primary btn-accent" onclick="eatIt()" id="eat-btn">✅ 먹었어요!</button>
          <button class="btn btn-outline" onclick="doSpin()">🔄 다시</button>
        </div>
      </div>
    </div>

    <div class="excluded-notice" id="excluded-notice" style="display:none">
      ⏳ <span id="excluded-text"></span>
    </div>
  </div>
</div>

<div id="screen-list" class="screen">
  <div class="page-header">
    <div class="page-title">맛집 목록 <span class="count-badge" id="list-count">0</span></div>
  </div>
  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="2" width="18"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="식당 또는 메뉴 검색..." id="search-input" oninput="renderList()">
  </div>
  <div class="category-filter cat-grid" id="list-cat-filter">
    <button class="chip active" data-cat="전체">전체</button>
    <button class="chip" data-cat="한식">🍚한식</button>
    <button class="chip" data-cat="중식">🥟중식</button>
    <button class="chip" data-cat="일식">🍣일식</button>
    <button class="chip" data-cat="양식">🍝양식</button>
    <button class="chip" data-cat="분식">🍢분식</button>
    <button class="chip" data-cat="기타">🍴기타</button>
  </div>
  <div class="restaurant-list" id="restaurant-list"></div>
  <button class="fab" onclick="openAddModal()">＋</button>
</div>

<div id="screen-history" class="screen">
  <div class="page-header">

<script>
const APP_VERSION = 'v1.2.13';

// ── STATE ──
let DB = {
  restaurants: [],
  history: [],
  settings: { excludeDays: 3 }
};
let selectedCatHome = '전체';
let selectedCatList = '전체';
let selectedSituation = '전체';
let selectedMeal = new Date().getHours() < 14 ? '점심' : '저녁';
let historyMeal = '점심';
let currentMenuTags = [];
let currentSitTags = [];
let selectedCatForm = '한식';
let currentResult = null;
let swipedCard = null;

// ── PERSIST ──
function save() { localStorage.setItem('mwmm_v1', JSON.stringify(DB)); }
function load() {
  try {
    const raw = localStorage.getItem('mwmm_v1');
    if (raw) DB = JSON.parse(raw);
  } catch(e) {}
}

// ── NAV ──
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelector(`.nav-btn[data-screen="${name}"]`).classList.add('active');
  if (name === 'list') renderList();
  if (name === 'history') renderHistory();
  if (name === 'settings') renderSettings();
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── MEAL ──
function selectMeal(meal) {
  selectedMeal = meal;
  document.querySelectorAll('.meal-btn[data-meal]').forEach(b => {
    b.classList.toggle('active', b.dataset.meal === meal);
  });
  const icon = meal === '점심' ? '🌞' : '🌙';
  document.getElementById('home-greeting-text').innerHTML =
    `🍽️ 오늘 ${icon} ${meal} 뭐 먹지? <span id="home-version-display" style="font-size:12px;font-weight:500;color:var(--muted);vertical-align:middle;">${APP_VERSION}</span>`;
}

function selectHistoryMeal(meal) {
  historyMeal = meal;
  document.querySelectorAll('.meal-btn[data-hmmeal]').forEach(b => {
    b.classList.toggle('active', b.dataset.hmmeal === meal);
  });
}

// ── SEASON ──
function getSeasonInfo() {
  const m = new Date().getMonth() + 1;
  if (m >= 3 && m <= 5)  return { cls: 'spring', text: '🌸 봄엔 가볍게! 냉면·비빔밥 어때요?' };
  if (m >= 6 && m <= 8)  return { cls: 'summer', text: '☀️ 더운 날엔 시원한 냉면이나 육회 어때요?' };
  if (m >= 9 && m <= 11) return { cls: 'autumn', text: '🍂 선선한 가을엔 따뜻한 국물 요리 어때요?' };
  return { cls: 'winter', text: '❄️ 추운 날엔 뜨끈한 순대국밥 한 그릇 어때요?' };
}

function renderSeasonBanner() {
  const el = document.getElementById('season-banner');
  const { cls, text } = getSeasonInfo();
  el.className = `season-banner ${cls}`;
  el.textContent = text;
  el.style.display = 'flex';
}

// ── CATEGORY FILTER ──
function initFilters() {
  document.getElementById('home-cat-filter').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#home-cat-filter .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedCatHome = chip.dataset.cat;
  });
  document.getElementById('home-situation-filter').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#home-situation-filter .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedSituation = chip.dataset.sit;
  });
  document.getElementById('list-cat-filter').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#list-cat-filter .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedCatList = chip.dataset.cat;
    renderList();
  });
  document.getElementById('sit-options').addEventListener('click', e => {
    const btn = e.target.closest('.cat-option');
    if (!btn) return;
    const sit = btn.dataset.sit;
    if (currentSitTags.includes(sit)) {
      currentSitTags = currentSitTags.filter(s => s !== sit);
      btn.classList.remove('active');
    } else {
      currentSitTags.push(sit);
      btn.classList.add('active');
    }
  });
}

// ── PREFERENCE ──
let prefRestaurantId = null;

function openPrefModal(id) {
  prefRestaurantId = id;
  const r = DB.restaurants.find(x => x.id === id);
  if (!r) return;
  document.getElementById('pref-modal-title').textContent = `${r.name} · 메뉴 선호도`;
  renderPrefMenuList(r);
  document.getElementById('pref-modal-overlay').classList.add('open');
}

function renderPrefMenuList(r) {
  const prefs = r.menuPrefs || {};
  document.getElementById('pref-menu-list').innerHTML = r.menus.map(m => {
    const p = prefs[m] !== undefined ? prefs[m] : 0;
    return `<div class="pref-menu-row">
      <span class="pref-menu-name">${m}</span>
      <div class="pref-toggle">
        <button class="pref-btn ${p === 1 ? 'active-like' : ''}"    onclick="setPref('${r.id}','${m}',1)">👍</button>
        <button class="pref-btn ${p === 0 ? 'active-neutral' : ''}" onclick="setPref('${r.id}','${m}',0)">😐</button>
        <button class="pref-btn ${p === -1 ? 'active-dislike' : ''}" onclick="setPref('${r.id}','${m}',-1)">👎</button>
      </div>
    </div>`;
  }).join('');
}

function setPref(id, menu, pref) {
  const r = DB.restaurants.find(x => x.id === id);
  if (!r) return;
  if (!r.menuPrefs) r.menuPrefs = {};
  r.menuPrefs[menu] = pref;
  save();
  renderPrefMenuList(r);
  renderList();
}

function closePrefModal(e) {
  if (e && e.target !== document.getElementById('pref-modal-overlay')) return;
  document.getElementById('pref-modal-overlay').classList.remove('open');
}

// 선호 메뉴 중 하나를 골라 반환 (👍 → 😐 → 전체 순으로 fallback)
function pickPreferredMenu(r) {
  const prefs = r.menuPrefs || {};
  const liked   = r.menus.filter(m => prefs[m] === 1);
  const neutral = r.menus.filter(m => (prefs[m] ?? 0) === 0);
  const pool = liked.length ? liked : (neutral.length ? neutral : r.menus);
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── 기억 헬퍼 ──
function getLastVisitDays(rid) {
  const visits = DB.history.filter(h => h.rid === rid);
  if (!visits.length) return null;
  const latest = Math.max(...visits.map(h => h.ts));
  return Math.floor((Date.now() - latest) / 86400000);
}
function getVisitCount(rid, days) {
  const cutoff = Date.now() - days * 86400000;
  return DB.history.filter(h => h.rid === rid && h.ts >= cutoff).length;
}

// ── 계절 키워드 보너스 ──
function getSeasonMenuBonus(r) {
  const m = new Date().getMonth() + 1;
  const text = r.menus.join(' ');
  const hit = (keywords) => keywords.some(k => text.includes(k));
  if (m >= 6 && m <= 8)  return hit(['냉면','냉','회','육회','비빔','샐러드','아이스']) ? 3 : 0;
  if (m <= 2 || m === 12) return hit(['국밥','순대','찌개','탕','전골','국','육류','고기']) ? 3 : 0;
  if (m >= 3 && m <= 5)  return hit(['비빔','냉','샐러드','브런치']) ? 1 : 0;
  if (m >= 9 && m <= 11) return hit(['탕','찌개','국','고기','구이']) ? 2 : 0;
  return 0;
}

// ── 종합 스코어 브레이크다운 ──
function computeScoreBreakdown(r) {
  const bd = { base: 5, pref: 0, memory: 0, freq: 0, weather: 0, season: 0, total: 0 };

  // 취향: 메뉴 선호도
  const prefVals = Object.values(r.menuPrefs || {});
  const likes    = prefVals.filter(p => p === 1).length;
  const dislikes = prefVals.filter(p => p === -1).length;
  bd.pref = likes * 4 - dislikes * 3;

  // 기억: 방문 공백 보너스 (오랫동안 안 가면 추천 증가)
  const lastDays = getLastVisitDays(r.id);
  if (lastDays === null)    bd.memory = 3;   // 미방문 → 새로운 발견 장려
  else if (lastDays > 21)  bd.memory = 4;   // 3주 이상 공백
  else if (lastDays > 14)  bd.memory = 2;   // 2주 이상
  else if (lastDays > 7)   bd.memory = 1;   // 1주 이상

  // 기억: 최근 30일 방문 빈도 페널티 (너무 자주 가면 소폭 감점)
  const freq30 = getVisitCount(r.id, 30);
  bd.freq = -Math.min(freq30, 5);

  // 상황: 날씨 매칭 보너스
  if (selectedSituation !== '전체' && (r.situations || []).includes(selectedSituation)) {
    bd.weather = 5;
  }

  // 계절: 메뉴 키워드 보너스
  bd.season = getSeasonMenuBonus(r);

  bd.total = Math.max(1, bd.base + bd.pref + bd.memory + bd.freq + bd.weather + bd.season);
  return bd;
}

// ── SPIN ──
function getExcludedIds() {
  const cutoff = Date.now() - DB.settings.excludeDays * 86400000;
  return new Set(DB.history.filter(h => h.ts >= cutoff).map(h => h.rid));
}

function getSeasonReason() {
  const m = new Date().getMonth() + 1;
  if (m >= 3 && m <= 5)  return '봄 날씨에 가볍게 먹기 좋은 메뉴예요';
  if (m >= 6 && m <= 8)  return '더운 날씨에 잘 맞는 메뉴예요';
  if (m >= 9 && m <= 11) return '선선한 날씨에 잘 어울리는 메뉴예요';
  return '추운 날씨에 몸을 녹여줄 메뉴예요';
}

const SITUATION_REASON = {
  '맑음': '맑은 날씨에 기분 좋게 먹기 좋은 메뉴예요',
  '비':   '비 오는 날 딱 어울리는 따뜻한 메뉴예요',
  '더워': '더운 날 시원하게 먹기 좋은 메뉴예요',
  '추워': '추운 날 몸을 녹여줄 메뉴예요',
};

function buildRecommendReason(r, usedSituation, isFallback) {
  const bd = r._breakdown || {};
  const parts = [];

  // 취향 기반
  const prefs = r.menuPrefs || {};
  const likedMenus = r.menus.filter(m => prefs[m] === 1);
  if (bd.pref > 0 && likedMenus.length) parts.push(`좋아하는 ${likedMenus[0]} 메뉴`);

  // 기억 기반
  const lastDays = getLastVisitDays(r.id);
  if (lastDays === null)   parts.push('아직 안 가본 곳');
  else if (bd.memory >= 4) parts.push(`${lastDays}일 만에 다시 추천`);
  else if (bd.memory >= 2) parts.push(`오랫동안 안 갔던 곳`);

  // 날씨·상황 기반
  if (bd.weather > 0) parts.push(`오늘 ${usedSituation} 날씨에 딱`);

  // 계절 기반
  if (bd.season > 0) parts.push('이 계절에 잘 맞는 메뉴');

  // 아무 이유 없으면
  if (!parts.length) parts.push(getSeasonReason());

  if (isFallback) parts.push('전체에서 재선택');

  return '💡 ' + parts.slice(0, 2).join(' · ');
}

function doSpin() {
  let pool = DB.restaurants.filter(r => selectedCatHome === '전체' || r.cat === selectedCatHome);
  // 상황 필터: 해당 상황 태그가 있는 식당 우선, 없으면 전체로 fallback
  if (selectedSituation !== '전체') {
    const situated = pool.filter(r => (r.situations || []).includes(selectedSituation));
    if (situated.length > 0) pool = situated;
  }
  const excludedIds = getExcludedIds();
  const available = pool.filter(r => !excludedIds.has(r.id));
  const pickFrom = available.length > 0 ? available : pool;

  if (pickFrom.length === 0) {
    toast('등록된 맛집이 없어요! 맛집을 먼저 추가해주세요 🍽️');
    return;
  }

  const btn = document.getElementById('spin-btn');
  btn.classList.remove('spinning');
  void btn.offsetWidth;
  btn.classList.add('spinning');

  setTimeout(() => {
    btn.classList.remove('spinning');
    // 기억 + 취향 + 상황 종합 점수 기반 가중 랜덤
    const scored = pickFrom.map(r => ({ r, bd: computeScoreBreakdown(r) }));
    const total  = scored.reduce((s, x) => s + x.bd.total, 0);
    let rand = Math.random() * total;
    let chosen = scored[scored.length - 1];
    for (const x of scored) { rand -= x.bd.total; if (rand <= 0) { chosen = x; break; } }
    currentResult = { ...chosen.r, _suggestedMenu: pickPreferredMenu(chosen.r), _breakdown: chosen.bd };
    showResult(currentResult, available.length === 0, selectedSituation);
  }, 950);

  // Show excluded notice
  if (excludedIds.size > 0) {
    document.getElementById('excluded-notice').style.display = 'flex';
    document.getElementById('excluded-text').textContent =
      `최근 ${DB.settings.excludeDays}일 내 먹은 ${excludedIds.size}곳은 제외됩니다`;
  } else {
    document.getElementById('excluded-notice').style.display = 'none';
  }
}

function showResult(r, isFallback, usedSituation = '전체') {
  document.getElementById('result-empty').style.display = 'none';
  document.getElementById('result-content').style.display = 'block';
  document.getElementById('result-name').textContent = r.name;
  const suggestedMenu = r._suggestedMenu || r.menus[0];
  const prefs = r.menuPrefs || {};
  const prefLabel = prefs[suggestedMenu] === 1 ? ' 👍' : prefs[suggestedMenu] === -1 ? ' 👎' : '';
  document.getElementById('result-menu').textContent = suggestedMenu + prefLabel
    + (r.menus.length > 1 ? ` 외 ${r.menus.length - 1}개` : '');
  document.getElementById('result-cat').textContent = r.cat;
  document.getElementById('result-reason').textContent = buildRecommendReason(r, usedSituation, isFallback);
  const card = document.getElementById('result-card');
  card.classList.add('revealed');

  if (isFallback) {
    document.getElementById('excluded-notice').style.display = 'flex';
    document.getElementById('excluded-text').textContent = '제외 대상이 없어 전체에서 선택했어요';
  }
}

function eatIt() {
  if (!currentResult) return;
  openHistoryModal('eat', currentResult);
}

// ── HISTORY MODAL ──
let historyModalMode = null;
let historyModalRestaurant = null;

function openHistoryModal(mode, restaurant = null) {
  historyModalMode = mode;
  historyModalRestaurant = restaurant;
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('hm-date').value = today;
  document.getElementById('hm-companion').value = '';
  historyMeal = selectedMeal;
  selectHistoryMeal(selectedMeal);
  if (mode === 'eat') {
    document.getElementById('history-modal-title').textContent = '식사 기록';
    document.getElementById('hm-restaurant-display-wrap').style.display = 'block';
    document.getElementById('hm-restaurant-display').textContent = restaurant.name;
    document.getElementById('hm-restaurant-input-wrap').style.display = 'none';
    document.getElementById('hm-menu').value = restaurant.menus.join(', ');
  } else {
    document.getElementById('history-modal-title').textContent = '식사 기록 추가';
    document.getElementById('hm-restaurant-display-wrap').style.display = 'none';
    document.getElementById('hm-restaurant-input-wrap').style.display = 'block';
    document.getElementById('hm-restaurant').value = '';
    document.getElementById('hm-menu').value = '';
  }
  document.getElementById('history-modal-overlay').classList.add('open');
}

function closeHistoryModal(e) {
  if (e && e.target !== document.getElementById('history-modal-overlay')) return;
  document.getElementById('history-modal-overlay').classList.remove('open');
}

function saveHistoryEntry() {
  const date = document.getElementById('hm-date').value;
  const companion = document.getElementById('hm-companion').value.trim();
  const menu = document.getElementById('hm-menu').value.trim();
  if (historyModalMode === 'eat') {
    const r = historyModalRestaurant;
    DB.history.unshift({ id: Date.now(), rid: r.id, name: r.name, menu: menu || r.menus.join(', '), ts: Date.now(), date, companion, meal: historyMeal });
    save();
    toast(`${r.name} 기록 완료! 😋`);
    document.getElementById('result-card').classList.remove('revealed');
    document.getElementById('result-content').style.display = 'none';
    document.getElementById('result-empty').style.display = 'block';
    document.getElementById('result-empty').textContent = '맛있게 드셨나요? 🎉';
    document.getElementById('excluded-notice').style.display = 'none';
    currentResult = null;
  } else {
    const name = document.getElementById('hm-restaurant').value.trim();
    if (!name) { toast('식당 이름을 입력해주세요.'); return; }
    const existing = DB.restaurants.find(r => r.name === name);
    DB.history.unshift({ id: Date.now(), rid: existing ? existing.id : null, name, menu: menu || '-', ts: Date.now(), date, companion, meal: historyMeal });
    save();
    renderHistory();
    toast('식사 기록 완료! 😋');
  }
  document.getElementById('history-modal-overlay').classList.remove('open');
}

// ── LIST ──
function renderList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const cat = selectedCatList;
  let list = DB.restaurants.filter(r => {
    const matchCat = cat === '전체' || r.cat === cat;
    const matchQ = !q || r.name.toLowerCase().includes(q) || r.menus.some(m => m.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById('list-count').textContent = DB.restaurants.length;
  const el = document.getElementById('restaurant-list');

  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state"><span class="emoji">🍴</span><p>등록된 맛집이 없어요.<br>아래 + 버튼으로 추가해보세요!</p></div>`;
    return;
  }

  el.innerHTML = list.map(r => `
    <div class="restaurant-card" id="rc-${r.id}" data-id="${r.id}">
      <div class="restaurant-card-info" onclick="openEditModal('${r.id}')">
        <div class="restaurant-card-name">${r.name}</div>
        <div class="restaurant-card-menus">${r.menus.map(m => {
          const p = (r.menuPrefs||{})[m];
          const dot = p === 1 ? '<span class="menu-pref-dot dot-like"></span>'
                    : p === -1 ? '<span class="menu-pref-dot dot-dislike"></span>' : '';
          return m + dot;
        }).join(' · ')}</div>
        <div class="restaurant-card-meta">
          <span class="badge">${r.cat}</span>
          ${(r.situations||[]).map(s => `<span class="badge" style="background:#E8F5E9;color:#2E7D32;">${s}</span>`).join('')}
          ${r.memo ? `<span style="font-size:12px;color:var(--muted);">${r.memo}</span>` : ''}
        </div>
        ${(() => {
          const total = DB.history.filter(h => h.rid === r.id).length;
          const last  = getLastVisitDays(r.id);
          if (total === 0) return `<div class="restaurant-card-visit">아직 미방문</div>`;
          return `<div class="restaurant-card-visit">방문 ${total}회 · 마지막 ${last}일 전</div>`;
        })()}
      </div>
      <button class="pref-open-btn" onclick="event.stopPropagation();openPrefModal('${r.id}')">⭐</button>
      <button class="delete-btn-slide" onclick="deleteRestaurant('${r.id}')">🗑️</button>
    </div>
  `).join('');

  // Swipe to delete
  list.forEach(r => {
    const card = document.getElementById('rc-' + r.id);
    let startX = 0;
    card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    card.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (dx < -50) {
        if (swipedCard && swipedCard !== card) swipedCard.classList.remove('swipe-left');
        card.classList.add('swipe-left');
        swipedCard = card;
      } else if (dx > 20) {
        card.classList.remove('swipe-left');
      }
    }, { passive: true });
  });
}

function deleteRestaurant(id) {
  if (!confirm('이 맛집을 삭제할까요?')) return;
  DB.restaurants = DB.restaurants.filter(r => r.id !== id);
  save(); renderList(); toast('삭제했어요.');
}

// ── MODAL ──
function renderSitTags() {
  currentSitTags.forEach(s => {
    const btn = document.querySelector(`#sit-options [data-sit="${s}"]`);
    if (btn) btn.classList.add('active');
  });
}

function openAddModal() {
  document.getElementById('modal-title').textContent = '맛집 등록';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-memo').value = '';
  currentMenuTags = [];
  currentSitTags = [];
  renderMenuTags();
  document.querySelectorAll('#sit-options .cat-option').forEach(b => b.classList.remove('active'));
  setFormCat('한식');
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id) {
  const r = DB.restaurants.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modal-title').textContent = '맛집 수정';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-name').value = r.name;
  document.getElementById('f-memo').value = r.memo || '';
  currentMenuTags = [...r.menus];
  currentSitTags = [...(r.situations || [])];
  renderMenuTags();
  document.querySelectorAll('#sit-options .cat-option').forEach(b => b.classList.remove('active'));
  renderSitTags();
  setFormCat(r.cat);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function addMenuTag() {
  const inp = document.getElementById('f-menu-input');
  const val = inp.value.trim();
  if (!val) return;
  if (!currentMenuTags.includes(val)) currentMenuTags.push(val);
  inp.value = '';
  renderMenuTags();
}
function menuInputKey(e) { if (e.key === 'Enter') addMenuTag(); }
function removeMenuTag(idx) { currentMenuTags.splice(idx, 1); renderMenuTags(); }
function renderMenuTags() {
  document.getElementById('menu-tags').innerHTML = currentMenuTags.map((m, i) =>
    `<span class="menu-tag">${m}<span class="menu-tag-del" onclick="removeMenuTag(${i})">×</span></span>`
  ).join('');
}

function setFormCat(cat) {
  selectedCatForm = cat;
  document.querySelectorAll('.cat-option').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
}
document.getElementById('cat-options').addEventListener('click', e => {
  const btn = e.target.closest('.cat-option');
  if (!btn) return;
  setFormCat(btn.dataset.cat);
});

function saveRestaurant() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('식당 이름을 입력해주세요.'); return; }
  if (currentMenuTags.length === 0) { toast('메뉴를 하나 이상 추가해주세요.'); return; }
  const editId = document.getElementById('edit-id').value;
  if (editId) {
    const r = DB.restaurants.find(x => x.id === editId);
    if (r) { r.name = name; r.menus = currentMenuTags; r.cat = selectedCatForm; r.memo = document.getElementById('f-memo').value.trim(); r.situations = [...currentSitTags]; }
    toast('수정했어요! ✅');
  } else {
    DB.restaurants.push({ id: Date.now().toString(), name, menus: currentMenuTags, cat: selectedCatForm, memo: document.getElementById('f-memo').value.trim(), situations: [...currentSitTags] });
    toast('맛집 등록 완료! 🎉');
  }
  save(); renderList();
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── HISTORY ──
function renderHistory() {
  const el = document.getElementById('history-list');
  if (DB.history.length === 0) {
    el.innerHTML = `<div class="empty-state"><span class="emoji">📅</span><p>아직 식사 기록이 없어요.<br>홈에서 메뉴를 뽑거나 + 버튼으로 추가해보세요!</p></div>`;
    return;
  }
  const catEmoji = { '한식':'🍚','중식':'🥟','일식':'🍣','양식':'🍝','분식':'🍢','기타':'🍴' };
  const groups = {};
  DB.history.forEach(h => {
    const key = h.date || (() => { const d = new Date(h.ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
    if (!groups[key]) groups[key] = [];
    groups[key].push(h);
  });
  const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
  el.innerHTML = sortedKeys.map(dateKey => {
    const [y, m, d] = dateKey.split('-');
    const label = `${y}년 ${Number(m)}월 ${Number(d)}일`;
    return `
    <div class="history-group">
      <div class="history-date-label">📅 ${label}</div>
      ${groups[dateKey].map(h => {
        const r = DB.restaurants.find(x => x.id === h.rid);
        const emoji = r ? (catEmoji[r.cat] || '🍴') : '🍴';
        const mealBadge = h.meal === '저녁'
          ? `<span class="meal-badge meal-badge-dinner">🌙 저녁</span>`
          : `<span class="meal-badge meal-badge-lunch">🌞 점심</span>`;
        return `<div class="history-item">
          <div class="history-emoji">${emoji}</div>
          <div class="history-info">
            <div class="history-restaurant">${mealBadge}${h.name}</div>
            <div class="history-menu">${h.menu}</div>
            ${h.companion ? `<div style="font-size:12px;color:var(--muted);margin-top:3px;">👥 ${h.companion}</div>` : ''}
          </div>
          <button class="history-del" onclick="deleteHistory('${h.id}')">🗑️</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function deleteHistory(id) {
  DB.history = DB.history.filter(h => h.id != id);
  save(); renderHistory(); toast('기록을 삭제했어요.');
}

// ── SETTINGS ──
function renderSettings() {
  document.getElementById('exclude-days-val').textContent = DB.settings.excludeDays;
  document.getElementById('app-version-display').textContent = APP_VERSION;
  document.getElementById('home-version-display').textContent = APP_VERSION;
}
function adjustExcludeDays(d) {
  DB.settings.excludeDays = Math.min(14, Math.max(1, DB.settings.excludeDays + d));
  save(); renderSettings();
}
function clearHistory() {
  if (!confirm('식사 이력을 모두 삭제할까요?')) return;
  DB.history = []; save(); toast('이력을 초기화했어요.');
}
function clearAll() {
  if (!confirm('모든 데이터를 삭제할까요? 복구할 수 없어요!')) return;
  DB = { restaurants: [], history: [], settings: { excludeDays: 3 } };
  save(); renderSettings(); toast('전체 초기화 완료.');
}
function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mwmm_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

// ── INIT ──
load();
initFilters();
selectMeal(selectedMeal);
renderSeasonBanner();
renderList();
renderHistory();
renderSettings();
</script>
